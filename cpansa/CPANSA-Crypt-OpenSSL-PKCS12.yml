  cves:
  - CVE-2026-8721
  description: Crypt::OpenSSL::PKCS12 versions through 1.94 for Perl truncates passwords
    with embedded NULLs.  Password parameters in PKCS12.xs are declared char *, which
    routes through Perl's default typemap to SvPV_nolen.  The Perl length is discarded.  The
    C code (or OpenSSL internally) calls strlen() on the buffer.  Any password byte
    at or after the first NULL is silently dropped. Binary / KDF-derived / HMAC-derived
    passwords lose entropy without any warnings.
  fixed_versions:
