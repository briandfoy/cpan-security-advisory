  description: Net::IP::LPM version 1.10 for Perl does not properly consider leading
    zero characters in IP CIDR address strings, which could allow attackers to bypass
    access control that is based on IP addresses.  Leading zeros are used to indicate
    octal numbers, which can confuse users who are intentionally using octal notation,
    as well as users who believe they are using decimal notation.
