  cves:
  - CVE-2026-40562
  description: 'Gazelle versions through 0.49 for Perl allows HTTP Request Smuggling
    via Improper Header Precedence.  Gazelle incorrectly prioritizes "Content-Length"
    over "Transfer-Encoding: chunked" when both headers are present in an HTTP request.
    Per RFC 7230 3.3.3, Transfer-Encoding must take precedence.  An attacker could
    exploit this to smuggle malicious HTTP requests via a front-end reverse proxy.'
