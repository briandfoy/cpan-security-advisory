  cves:
  - CVE-2026-41564
  description: CryptX versions before 0.088 for Perl do not reseed the Crypt::PK PRNG
    state after forking.  The Crypt::PK::RSA, Crypt::PK::DSA, Crypt::PK::DH, Crypt::PK::ECC,
    Crypt::PK::Ed25519 and Crypt::PK::X25519 modules seed a per-object PRNG state
    in their constructors and reuse it without fork detection. A Crypt::PK::* object
    created before `fork()` shares byte-identical PRNG state with every child process,
    and any randomized operation they perform can produce identical output, including
    key generation. Two ECDSA or DSA signatures from different processes are enough
    to recover the signing private key through nonce-reuse key recovery.  This affects
    preforking services such as the Starman web server, where a Crypt::PK::* object
    loaded at startup is inherited by every worker process.
  fixed_versions:
