  - CVE-2026-13401
  description: XML::Bare versions through 0.53 for Perl will hang in an infinite loop
    when parsing malformed attributes.  The parserc_parse function never advances
    the attribute-parse state cursor on certain malformed attribute forms, looping
    forever.  Nameless attributes such as "<a ='c'>" or unbalanced quotes "<a b='''''''c'>"
    can trigger this condition.
