  - CVE-2026-12746
  description: 'Dancer2::Plugin::Auth::OAuth::Provider versions before 0.23 for Perl
    do not support the OAuth 2.0 state parameter.  The authentication_url method builds
    the provider authorization redirect without issuing a state value, and the callback
    method exchanges the callback code and registers the resulting token into the
    session without verifying that the callback corresponds to an authorization request
    this session initiated.  Any application that uses this plugin for OAuth 2.0 login
    is exposed to login cross-site request forgery: because the callback is not bound
    to the session that began the flow, an attacker who starts an authorization with
    their own provider account can deliver the resulting callback to a victim, causing
    the victim''s session to complete the attacker''s authorization and associating
    the attacker''s provider identity and access token with that session. Where the
    application persists this as an account link, the attacker may retain access to
    the victim''s account through their own provider credentials.'
