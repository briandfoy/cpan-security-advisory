  cves:
  - CVE-2026-56018
  description: JavaScript::Minifier::XS versions before 0.16 for Perl leak memory
    on every call to minify(), allowing unbounded memory growth.  In JsMinify (XS.xs)
    the cleanup frees only the NodeSet structures and never the per-token contents
    buffers allocated in JsSetNodeContents; JsDiscardNode unlinks nodes without freeing
    their contents. Each token's contents buffer is therefore leaked on every call,
    and the two early returns taken when the node list is empty leak the whole NodeSet.  A
    long-lived process that minifies repeatedly, such as an asset pipeline or a server-side
    minifier endpoint, grows in memory without bound until it exhausts available memory
    and is killed, causing denial of service.
  fixed_versions:
