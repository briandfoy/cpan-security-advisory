  - CVE-2026-2588
  description: Crypt::NaCl::Sodium versions through 2.001 for Perl has an integer
    overflow flaw on 32-bit systems.  Sodium.xs casts a STRLEN (size_t) to unsigned
    long long when passing a length pointer to libsodium functions.  On 32-bit systems
    size_t is typically 32-bits while an unsigned long long is at least 64-bits.
