  cves:
  - CVE-2026-57073
  description: HTML::Bare versions through 0.04 for Perl have an unbounded character
    lookahead.  The parserc_parse function attempts to check for multicharacter strings
    such as "<![CDATA" or element terminators such as ">" without checking that the
    offsets are within the buffer.  Truncated strings such as "<a/" can trigger an
    out-of-bounds read.  Note that the latest version available on CPAN is version
