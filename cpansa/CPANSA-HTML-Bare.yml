  - CVE-2026-13397
  description: HTML::Bare versions through 0.04 for Perl will hang in an infinite
    loop when parsing malformed attributes.  The parserc_parse function never advances
    the attribute-parse state cursor on certain malformed attribute forms, looping
    forever.  Nameless attributes such as "<a ='c'>" or unbalanced quotes "<a b='''''''c'>"
    can trigger this condition.  Note that the latest version available on CPAN is
    version 0.02. Newer versions are available on the git repository.
