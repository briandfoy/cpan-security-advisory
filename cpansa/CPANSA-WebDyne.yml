  cves:
  - CVE-2026-5084
  description: WebDyne::Session versions through 2.075 for Perl generates the session
    id insecurely.  The session handler generates the session id from an MD5 hash
    seeded with a call to the built-in rand() function. The rand function is passed
    a maximum value based on the process id, the epoch time and the reference address
    of the object, but this information will have no effect on the overall quality
    of the seed of the message digest.  The rand function is seeded by 32-bits and
    is predictable. It is considered unsuitable for cryptographic purposes.  Predictable
    session ids could allow an attacker to gain access to systems.  Note that WebDyne::Session
    versions 1.042 and earlier appear to be in separate distributions from WebDyne.
