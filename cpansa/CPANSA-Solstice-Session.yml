  cves:
  - CVE-2026-5085
  description: Solstice::Session versions through 1440 for Perl generates session
    ids insecurely.  The _generateSessionID method returns an MD5 digest seeded by
    the epoch time, a random hash reference, a call to the built-in rand() function
    and the process id.  The same method is used in the _generateID method in Solstice::Subsession,
    which is part of the same distribution.  The epoch time may be guessed, if it
    is not leaked in the HTTP Date header. Stringified hash refences will contain
    predictable content. The built-in rand() function is seeded by 16-bits and is
    unsuitable for security purposes. The process id comes from a small set of numbers.  Predictable
    session ids could allow an attacker to gain access to systems.
