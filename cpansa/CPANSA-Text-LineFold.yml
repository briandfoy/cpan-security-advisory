  cves:
  - CVE-2026-8594
  description: Text::LineFold versions through 2019.001 for Perl duplicate the output
    based on the number of special break characters.  Text::LineFold splits the input
    string by specific line break characters (such as VT, FF and others) into segments,
    but applies the break function to the entire string, not just the segment.  A
    side effect of this is that the full input can be duplicated for each segment.  Besides
    being incorrect, this can lead to unexpected resource consumption and possible
    denial of service.  Note that Text::LineFold is part of the Unicode-LineBreak
    distribution, which may have a higher version number than the module.
