  - CVE-2026-8177
  description: XML::LibXML versions through 2.0210 for Perl read out-of-bounds heap
    memory when parsing XML node names containing truncated UTF-8 byte sequences.  A
    node name ending in the middle of a multi byte UTF-8 sequence causes the parser
    to read past the end of the input string into adjacent heap memory.  Any Perl
    process that passes attacker controlled strings to XML::LibXML's DOM node-name
    methods can reach this path on the default API. The likely consequence is a crash,
    causing denial of service.
