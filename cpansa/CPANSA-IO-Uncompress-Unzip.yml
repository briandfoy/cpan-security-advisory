  cves:
  - CVE-2025-15649
  description: IO::Uncompress::Unzip versions before 2.215 for Perl propagate uncaught
    exception when parsing zip header with malformed DOS date.  _dosToUnixTime() decodes
    the local-file-header last-modification date field and calls Time::Local::timelocal()
    without an eval guard. A header whose date field decodes to an out-of-range month,
    day, or hour causes timelocal() to die.  The exception propagates out of IO::Uncompress::Unzip->new($file)
    where callers expect undef plus $UnzipError.
