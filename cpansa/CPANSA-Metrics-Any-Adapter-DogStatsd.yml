  - CVE-2026-50638
  description: Metrics::Any::Adapter::DogStatsd versions before 0.04 for Perl does
    not protect against metric injections.  The statsd protocol (and extensions such
    as dogstatsd) allow mutiple metrics, separated by newlines, to be sent per packet.  Metrics::Any::Adapter::DogStatsd
    which extends Metrics::Any::Adapter::Statsd, which has a similar vulnerability.  In
    addition, the _tags function does not check tags for newlines or statsd control
    characters. The tags can be used for metric injections.
