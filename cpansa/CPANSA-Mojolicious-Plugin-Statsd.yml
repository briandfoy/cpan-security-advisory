  description: Mojolicious::Plugin::Statsd versions through 0.04 for Perl allowed
    metric injections.  The metric names and set values were not checked for newlines,
    colons or pipes. Metrics generated from untrusted sources could inject additional
    statsd metrics.  Version 0.06 changes the module from being a statsd client to
