  - CVE-2026-45179
  description: Plack::Middleware::Statsd versions before 0.9.0 for Perl may leak user
    IP addresses.  If the communication channel to the statsd daemon is not secured
    (for example, by sending UDP packets to a host on another network), then users'
    IP addresses may be leaked.  Since version 0.9.0, the IP address is no longer
